<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/3amshop-favicon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Three Am Shop - Your Shopping Destination"
    />

    <!-- iOS-specific meta tags for PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Three Am Shop" />

    <!-- iOS app icons (multiple sizes for different devices) -->
    <link rel="apple-touch-icon" href="/3amshop-logo-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/3amshop-logo-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/3amshop-logo-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/3amshop-logo-192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
      integrity="sha512-iBBXm8fW90+nuLcSKlbmrPcLa0OT92xO1BIsZ+ywDWZCvqsWgccV3gFoRBv0z+8dLJgyAHIhR35VZc2oM/gI1w=="
      crossorigin="anonymous"
    />

    <title>Three Am Shop</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script>
      // Unregister service worker to clear cache
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .getRegistrations()
          .then(function (registrations) {
            for (let registration of registrations) {
              console.log("Unregistering Service Worker:", registration);
              registration.unregister();
            }
          });
      }
    </script>

    <!-- Vite will inject the script here -->
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
